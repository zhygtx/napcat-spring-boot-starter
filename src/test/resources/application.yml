# ============================================================
# NapCat SDK 测试配置文件
# 这些配置对应 NapCatProperties 类
# ============================================================

server:
  port: 8080

spring:
  application:
    name: napcat-test-app

napcat:
  ws:
    server:
      enable: true
      url: /ws/bot
    timeout: 30
    heartbeat-timeout: 60
    heartbeat-min-interval: 5
    max-text-buffer-size: 1048576
    max-binary-buffer-size: 1048576
    enable-token: true
    token-value: ""

  task-pool:
    core-pool-size: 50
    max-pool-size: 100
    queue-capacity: 5000
    keep-alive-time: 60
    thread-name-prefix: "NapCatTaskPool-"

logging:
  level:
    root: INFO
    com.github.zhygtx.napcat: DEBUG
    org.springframework.web.socket: DEBUG
